global:
  scrape_interval: 15s

scrape_configs:
  - job_name: oecophylla-services
    static_configs:
      - targets:
          - "auth-service:8001"
          - "user-service:8002"
          - "content-service:8003"
          - "interaction-service:8004"
          - "feed-service:8005"
          - "moderation-service:8006"
          - "notification-service:8007"
        labels: { stack: oecophylla }
  - job_name: recommendation-api
    metrics_path: /metrics
    static_configs:
      - targets: ["recommendation-api:8090"]
  - job_name: analytics-service
    metrics_path: /metrics
    static_configs:
      - targets: ["analytics-service:8091"]
  - job_name: envoy
    metrics_path: /stats/prometheus
    static_configs:
      - targets: ["envoy:9901"]
