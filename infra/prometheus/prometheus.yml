global:
  scrape_interval: 15s

scrape_configs:
  - job_name: oecophylla-services
    static_configs:
      - targets:
          - "auth-service:8001"
          - "user-service:8002"
          - "content-service:8003"
          - "feed-service:8005"
        labels: { stack: oecophylla }
  - job_name: envoy
    metrics_path: /stats/prometheus
    static_configs:
      - targets: ["envoy:9901"]
