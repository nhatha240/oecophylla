name: oecophylla

x-restart: &restart
  restart: unless-stopped

services:
  postgres:
    <<: *restart
    image: postgres:18-trixie
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  redis:
    <<: *restart
    image: redis:8-trixie
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    <<: *restart
    image: apache/kafka:4.0.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s

  init-topics:
    image: apache/kafka:4.0.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic oecophylla.content.created   --partitions 1 --replication-factor 1 && \
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic oecophylla.user.followed    --partitions 1 --replication-factor 1 && \
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic oecophylla.interactions     --partitions 1 --replication-factor 1 && \
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic oecophylla.moderation.action --partitions 1 --replication-factor 1 --config retention.ms=604800000
    restart: "no"

  migrate:
    image: rust:slim
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /app
    volumes:
      - ./migrations:/app/migrations:ro
      - cargo_cache:/usr/local/cargo/registry
    environment:
      DATABASE_URL: ${DATABASE_URL}
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        cargo install --quiet sqlx-cli --version '^0.8' --no-default-features --features postgres,rustls && \
        sqlx migrate run --source ./migrations
    restart: "no"

  envoy:
    <<: *restart
    image: envoyproxy/envoy:v1.32-latest
    depends_on:
      auth-service:        { condition: service_started }
      user-service:        { condition: service_started }
      content-service:     { condition: service_started }
      interaction-service: { condition: service_started }
      feed-service:        { condition: service_started }
    volumes:
      - ./envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
    ports:
      - "8080:8080"
      - "9901:9901"
    command: ["/usr/local/bin/envoy", "-c", "/etc/envoy/envoy.yaml", "--log-level", "info"]

  auth-service:
    <<: *restart
    build:
      context: ./backend
      dockerfile: services/auth-service/Dockerfile
    depends_on:
      postgres:  { condition: service_healthy }
      redis:     { condition: service_healthy }
      kafka:     { condition: service_healthy }
      migrate:   { condition: service_completed_successfully }
    environment: &svc_env
      RUST_LOG: info,sqlx=warn
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      KAFKA_BROKERS: ${KAFKA_BROKERS}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TTL_SECONDS: ${JWT_ACCESS_TTL_SECONDS}
      JWT_REFRESH_TTL_SECONDS: ${JWT_REFRESH_TTL_SECONDS}
      ARGON2_M_COST: ${ARGON2_M_COST}
      ARGON2_T_COST: ${ARGON2_T_COST}
      ARGON2_P_COST: ${ARGON2_P_COST}
      AUTO_PUBLISH: "true"

  user-service:
    <<: *restart
    build:
      context: ./backend
      dockerfile: services/user-service/Dockerfile
    depends_on:
      postgres:  { condition: service_healthy }
      redis:     { condition: service_healthy }
      kafka:     { condition: service_healthy }
      migrate:   { condition: service_completed_successfully }
    environment:
      <<: *svc_env

  content-service:
    <<: *restart
    build:
      context: ./backend
      dockerfile: services/content-service/Dockerfile
    depends_on:
      postgres:  { condition: service_healthy }
      redis:     { condition: service_healthy }
      kafka:     { condition: service_healthy }
      migrate:   { condition: service_completed_successfully }
    environment:
      <<: *svc_env

  interaction-service:
    <<: *restart
    build:
      context: ./backend
      dockerfile: services/interaction-service/Dockerfile
    depends_on:
      postgres:  { condition: service_healthy }
      redis:     { condition: service_healthy }
      kafka:     { condition: service_healthy }
      migrate:   { condition: service_completed_successfully }
    environment:
      <<: *svc_env

  feed-service:
    <<: *restart
    build:
      context: ./backend
      dockerfile: services/feed-service/Dockerfile
    depends_on:
      postgres:           { condition: service_healthy }
      redis:              { condition: service_healthy }
      migrate:            { condition: service_completed_successfully }
      recommendation-api: { condition: service_started }
    environment:
      <<: *svc_env
      RECOMMENDATION_SERVICE_URL: http://recommendation-api:8090
      FEED_CACHE_TTL_SECONDS: "600"
      FEED_RECOMMENDATION_TIMEOUT_MS: "500"
      FEED_RESULT_SIZE: "50"
      FEED_CANDIDATE_POOL_SIZE: "300"

  moderation-service:
    <<: *restart
    build:
      context: ./backend
      dockerfile: services/moderation-service/Dockerfile
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      kafka:    { condition: service_healthy }
      migrate:  { condition: service_completed_successfully }
      init-topics: { condition: service_completed_successfully }
    environment:
      <<: *svc_env

  recommendation-api:
    <<: *restart
    build:
      context: .
      dockerfile: recommendation_api/Dockerfile
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      migrate:  { condition: service_completed_successfully }
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}

  feature-store-worker:
    <<: *restart
    build:
      context: .
      dockerfile: workers/feature_store_worker/Dockerfile
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      kafka:    { condition: service_healthy }
      migrate:  { condition: service_completed_successfully }
      init-topics: { condition: service_completed_successfully }
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      KAFKA_BROKERS: ${KAFKA_BROKERS}

  cache-invalidator:
    <<: *restart
    build:
      context: ./backend
      dockerfile: services/cache-invalidator/Dockerfile
    depends_on:
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }
      init-topics: { condition: service_completed_successfully }
    environment:
      <<: *svc_env

  frontend:
    <<: *restart
    build:
      context: ./frontend
    depends_on:
      envoy: { condition: service_started }
    environment:
      ORIGIN: ${ORIGIN}
      ENVOY_URL: ${ENVOY_URL}
      PUBLIC_API_BASE: ${PUBLIC_API_BASE}
    ports:
      - "3000:3000"

  prometheus:
    <<: *restart
    image: prom/prometheus:v3.0.0
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    <<: *restart
    image: grafana/grafana:11.4.0
    depends_on: [prometheus]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"

  scripts:
    profiles: ["tools"]
    build: ./scripts
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      DATABASE_URL: ${DATABASE_URL}

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  cargo_cache:
