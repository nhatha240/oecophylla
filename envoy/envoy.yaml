admin:
  address:
    socket_address: { address: 0.0.0.0, port_value: 9901 }

static_resources:
  listeners:
    - name: listener_0
      address:
        socket_address: { address: 0.0.0.0, port_value: 8080 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                codec_type: AUTO
                route_config:
                  name: local
                  virtual_hosts:
                    - name: oecophylla
                      domains: ["*"]
                      cors:
                        allow_origin_string_match:
                          - prefix: "http://localhost:3000"
                        allow_methods: "GET, POST, PUT, DELETE, OPTIONS"
                        allow_headers: "content-type, authorization, cookie, x-request-id, x-requested-with"
                        allow_credentials: true
                        max_age: "1728000"
                      routes:
                        - match: { prefix: "/api/v1/auth/" }
                          route:  { cluster: auth_cluster, prefix_rewrite: "/api/v1/auth/" }
                        - match: { prefix: "/api/v1/users/" }
                          route:  { cluster: user_cluster, prefix_rewrite: "/api/v1/users/" }
                        - match: { prefix: "/api/v1/users" }
                          route:  { cluster: user_cluster }
                        - match: { prefix: "/api/v1/interactions/me/batch" }
                          route:  { cluster: interaction_cluster }
                        - match:
                            safe_regex:
                              regex: '^/api/v1/(posts/[^/]+/(like|save|share|hide|report|comments(?:/.*)?|me)/?|comments/[^/]+(?:/.*)?)$'
                          route: { cluster: interaction_cluster }
                        - match: { prefix: "/api/v1/posts/" }
                          route:  { cluster: content_cluster, prefix_rewrite: "/api/v1/posts/" }
                        - match: { prefix: "/api/v1/posts" }
                          route:  { cluster: content_cluster }
                http_filters:
                  - name: envoy.filters.http.cors
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.Cors
                  - name: envoy.filters.http.local_ratelimit
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.local_ratelimit.v3.LocalRateLimit
                      stat_prefix: ingress_http_rl
                      token_bucket:
                        max_tokens: 60
                        tokens_per_fill: 60
                        fill_interval: 60s
                      filter_enabled:
                        runtime_key: local_rate_limit_enabled
                        default_value: { numerator: 100, denominator: HUNDRED }
                      filter_enforced:
                        runtime_key: local_rate_limit_enforced
                        default_value: { numerator: 100, denominator: HUNDRED }
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: auth_cluster
      type: STRICT_DNS
      connect_timeout: 1s
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: auth_cluster
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: auth-service, port_value: 8001 } } }
      health_checks:
        - timeout: 1s
          interval: 5s
          unhealthy_threshold: 3
          healthy_threshold: 1
          http_health_check: { path: "/health" }
    - name: user_cluster
      type: STRICT_DNS
      connect_timeout: 1s
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: user_cluster
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: user-service, port_value: 8002 } } }
      health_checks:
        - timeout: 1s
          interval: 5s
          unhealthy_threshold: 3
          healthy_threshold: 1
          http_health_check: { path: "/health" }
    - name: content_cluster
      type: STRICT_DNS
      connect_timeout: 1s
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: content_cluster
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: content-service, port_value: 8003 } } }
      health_checks:
        - timeout: 1s
          interval: 5s
          unhealthy_threshold: 3
          healthy_threshold: 1
          http_health_check: { path: "/health" }
    - name: interaction_cluster
      type: STRICT_DNS
      connect_timeout: 1s
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: interaction_cluster
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: interaction-service, port_value: 8004 } } }
      health_checks:
        - timeout: 1s
          interval: 5s
          unhealthy_threshold: 3
          healthy_threshold: 1
          http_health_check: { path: "/health" }
